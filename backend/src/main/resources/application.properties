spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

server.port=${PORT:8787}
spring.application.name=sg-ai-agent-portfolio-api

openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model=${OPENAI_MODEL:gpt-5-mini}
openai.document-model=${OPENAI_DOCUMENT_MODEL:gpt-5-mini}
openai.voice-model=${OPENAI_VOICE_MODEL:gpt-4o-mini-transcribe}
openai.voice-language=${OPENAI_VOICE_LANGUAGE:es}
openai.voice-prompt=${OPENAI_VOICE_PROMPT:espanol rioplatense, conversacion natural, turnos medicos, fechas, horarios, nombres propios}
openai.conversation-model=${OPENAI_CONVERSATION_MODEL:gpt-realtime-mini}
openai.conversation-voice=${OPENAI_CONVERSATION_VOICE:alloy}
openai.conversation-instructions=${OPENAI_CONVERSATION_INSTRUCTIONS:}
openai.realtime-webrtc-url=${OPENAI_REALTIME_WEBRTC_URL:https://api.openai.com/v1/realtime/calls}

spring.datasource.url=${PORTFOLIO_DB_URL:jdbc:h2:file:./data/portfolio-demo;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${PORTFOLIO_DB_DRIVER:org.h2.Driver}
spring.datasource.username=${PORTFOLIO_DB_USER:sa}
spring.datasource.password=${PORTFOLIO_DB_PASSWORD:}

portfolio.cors.allowed-origins=${PORTFOLIO_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
portfolio.cors.allowed-origin-patterns=${PORTFOLIO_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
portfolio.ip-prompt-limit.enabled=${PORTFOLIO_IP_PROMPT_LIMIT_ENABLED:false}
portfolio.ip-prompt-limit.max-prompts=${PORTFOLIO_IP_PROMPT_LIMIT_MAX_PROMPTS:20}
portfolio.ip-prompt-limit.chat-cost=${PORTFOLIO_IP_PROMPT_LIMIT_CHAT_COST:1}
portfolio.ip-prompt-limit.voice-minute-cost=${PORTFOLIO_IP_PROMPT_LIMIT_VOICE_MINUTE_COST:5}
portfolio.ip-prompt-limit.voice-session-seconds=${PORTFOLIO_IP_PROMPT_LIMIT_VOICE_SESSION_SECONDS:60}

contact.mail.to-address=${CONTACT_MAIL_TO_ADDRESS:sebasdeveloperlife@gmail.com}
contact.mail.from-address=${CONTACT_MAIL_FROM_ADDRESS:contacto@sgdev.com.ar}
contact.mail.mailtrap-token=${MAILTRAP_API_TOKEN:}
contact.mail.mailtrap-base-url=${MAILTRAP_API_BASE_URL:https://send.api.mailtrap.io/api}
contact.mail.mailtrap-inbox-id=${MAILTRAP_INBOX_ID:}
