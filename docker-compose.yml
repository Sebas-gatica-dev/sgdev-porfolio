services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: portfolio-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8787
      PORTFOLIO_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-portfolio}
      PORTFOLIO_DB_DRIVER: org.postgresql.Driver
      PORTFOLIO_DB_USER: ${POSTGRES_USER:-portfolio}
      PORTFOLIO_DB_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_local}
      PORTFOLIO_CORS_ALLOWED_ORIGINS: ${PORTFOLIO_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      PORTFOLIO_CORS_ALLOWED_ORIGIN_PATTERNS: ${PORTFOLIO_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8787"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  portfolio_postgres_data:
