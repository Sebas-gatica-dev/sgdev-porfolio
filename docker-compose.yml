services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_local}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - portfolio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portfolio} -d ${POSTGRES_DB:-portfolio}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: portfolio-ollama
    restart: unless-stopped
    volumes:
      - portfolio_ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    container_name: portfolio-ollama-pull
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      PORTFOLIO_FREE_MODEL_NAME: ${PORTFOLIO_FREE_MODEL_NAME:-qwen3:0.6b}
    entrypoint: ["/bin/sh"]
    command:
      - -lc
      - |
        until ollama list >/dev/null 2>&1; do sleep 2; done
        ollama pull "$$PORTFOLIO_FREE_MODEL_NAME"
    depends_on:
      ollama:
        condition: service_healthy

  free-model:
    build:
      context: ./free-model-api
    container_name: portfolio-free-model
    restart: unless-stopped
    environment:
      PORT: 8795
      FREE_MODEL_OLLAMA_URL: http://ollama:11434
      FREE_MODEL_MODEL: ${PORTFOLIO_FREE_MODEL_NAME:-qwen3:0.6b}
      FREE_MODEL_NUM_CTX: ${PORTFOLIO_FREE_MODEL_NUM_CTX:-2048}
      FREE_MODEL_MAX_TOKENS: ${PORTFOLIO_FREE_MODEL_MAX_TOKENS:-420}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "${FREE_MODEL_HTTP_PORT:-8795}:8795"
    expose:
      - "8795"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      PORT: 8787
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      OPENAI_DOCUMENT_MODEL: ${OPENAI_DOCUMENT_MODEL:-gpt-5-mini}
      OPENAI_VOICE_MODEL: ${OPENAI_VOICE_MODEL:-gpt-4o-mini-transcribe}
      OPENAI_VOICE_LANGUAGE: ${OPENAI_VOICE_LANGUAGE:-es}
      OPENAI_VOICE_PROMPT: ${OPENAI_VOICE_PROMPT:-espanol rioplatense, conversacion natural, turnos medicos, fechas, horarios, nombres propios}
      OPENAI_CONVERSATION_MODEL: ${OPENAI_CONVERSATION_MODEL:-gpt-realtime-mini}
      OPENAI_CONVERSATION_VOICE: ${OPENAI_CONVERSATION_VOICE:-alloy}
      OPENAI_CONVERSATION_INSTRUCTIONS: ${OPENAI_CONVERSATION_INSTRUCTIONS:-}
      OPENAI_REALTIME_WEBRTC_URL: ${OPENAI_REALTIME_WEBRTC_URL:-https://api.openai.com/v1/realtime/calls}
      PORTFOLIO_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-portfolio}
      PORTFOLIO_DB_DRIVER: org.postgresql.Driver
      PORTFOLIO_DB_USER: ${POSTGRES_USER:-portfolio}
      PORTFOLIO_DB_PASSWORD: ${POSTGRES_PASSWORD:-portfolio_local}
      PORTFOLIO_CORS_ALLOWED_ORIGINS: ${PORTFOLIO_CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      PORTFOLIO_CORS_ALLOWED_ORIGIN_PATTERNS: ${PORTFOLIO_CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      PORTFOLIO_IP_PROMPT_LIMIT_ENABLED: ${PORTFOLIO_IP_PROMPT_LIMIT_ENABLED:-false}
      PORTFOLIO_IP_TOKEN_LIMIT_MAX_TOKENS: ${PORTFOLIO_IP_TOKEN_LIMIT_MAX_TOKENS:-200}
      PORTFOLIO_IP_TOKEN_LIMIT_CHAT_COST: ${PORTFOLIO_IP_TOKEN_LIMIT_CHAT_COST:-10}
      PORTFOLIO_IP_TOKEN_LIMIT_VOICE_COST: ${PORTFOLIO_IP_TOKEN_LIMIT_VOICE_COST:-10}
      PORTFOLIO_IP_PROMPT_LIMIT_VOICE_SESSION_SECONDS: ${PORTFOLIO_IP_PROMPT_LIMIT_VOICE_SESSION_SECONDS:-60}
      PORTFOLIO_IP_TOKEN_LIMIT_MAX_VOICE_SECONDS: ${PORTFOLIO_IP_TOKEN_LIMIT_MAX_VOICE_SECONDS:-300}
      PORTFOLIO_USAGE_ADMIN_TOKEN: ${PORTFOLIO_USAGE_ADMIN_TOKEN:-}
      PORTFOLIO_FREE_MODEL_ENABLED: ${PORTFOLIO_FREE_MODEL_ENABLED:-true}
      PORTFOLIO_FREE_MODEL_BASE_URL: http://free-model:8795
      PORTFOLIO_FREE_MODEL_NAME: ${PORTFOLIO_FREE_MODEL_NAME:-qwen3:0.6b}
      CONTACT_MAIL_TO_ADDRESS: ${CONTACT_MAIL_TO_ADDRESS:-}
      CONTACT_MAIL_FROM_ADDRESS: ${CONTACT_MAIL_FROM_ADDRESS:-contacto@sgdev.com.ar}
      MAILTRAP_API_BASE_URL: ${MAILTRAP_API_BASE_URL:-https://send.api.mailtrap.io/api}
      MAILTRAP_API_TOKEN: ${MAILTRAP_API_TOKEN:-}
      MAILTRAP_INBOX_ID: ${MAILTRAP_INBOX_ID:-}
    depends_on:
      db:
        condition: service_healthy
      free-model:
        condition: service_started
    expose:
      - "8787"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    container_name: portfolio-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  portfolio_postgres_data:
  portfolio_ollama_data:
